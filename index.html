// ─── SHEETS API ───────────────────────────────────────────────────────────────
let _tok=null;
async function getToken(){
  if(_tok&&_tok.exp>Date.now()/1000+60) return _tok.t;
  const now=Math.floor(Date.now()/1000);
  const enc=o=>btoa(JSON.stringify(o)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const h=enc({alg:'RS256',typ:'JWT'});
  const c=enc({iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
  const u=`${h}.${c}`;
  const pem=PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('pkcs8',bin.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(u));
  const s=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${u}.${s}`});
  const d=await r.json(); _tok={t:d.access_token,exp:now+3600}; return d.access_token;
}
async function readSheet(tab){
  const t=await getToken();
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}`,{headers:{Authorization:`Bearer ${t}`}});
  return (await r.json()).values||[];
}
async function appendRow(tab,vals){
  const t=await getToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}:append?valueInputOption=USER_ENTERED`,{method:'POST',headers:{Authorization:`Bearer ${t}`,'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})});
}

// ─── PARSERS ──────────────────────────────────────────────────────────────────
function parseLog(rows){
  // Date,User,Cat,Act,XP,Done,Mins
  const L={};
  for(let i=1;i<rows.length;i++){
    const [date,user,cat,act,,done,mins]=rows[i];
    if(!date||!user||!cat||!act) continue;
    if(!L[user])L[user]={};
    if(!L[user][date])L[user][date]={};
    L[user][date][`${cat}::${act}`]={done:done==='TRUE',mins:parseInt(mins)||0};
  }
  return L;
}
function parseMeas(rows){
  const M={};
  for(let i=1;i<rows.length;i++){
    const [date,user,area,value]=rows[i];
    if(!date||!user||!area||value==null) continue;
    if(!M[user])M[user]={};
    if(!M[user][date])M[user][date]={};
    M[user][date][area]=parseFloat(value);
  }
  return M;
}
function parseTargets(rows){
  const T={};
  for(let i=1;i<rows.length;i++){
    const [user,area,target]=rows[i];
    if(!user||!area) continue;
    if(!T[user])T[user]={};
    T[user][area]=parseFloat(target)||null;
  }
  return T;
}
function parseTasks(rows){
  // ID,User,Title,Notes,Section,DueDate,EstMins,ActMins,Starred,Status,CompletedAt,CreatedAt
  const T={};
  for(let i=1;i<rows.length;i++){
    const [id,user,title,notes,section,due,est,act,starred,status,completedAt,createdAt]=rows[i];
    if(!id||!user||!title) continue;
    if(id.endsWith('-done')) continue; // skip completion log rows
    if(!T[user])T[user]=[];
    const existing=T[user].find(t=>t.id===id);
    if(existing){existing.actMins=parseInt(act)||0;existing.status=status||existing.status;existing.completedAt=completedAt||existing.completedAt;}
    else T[user].push({id,user,title:title||'',notes:notes||'',section:section||'Work',dueDate:due||'',estMins:parseInt(est)||0,actMins:parseInt(act)||0,starred:starred==='TRUE',status:status||'active',completedAt:completedAt||'',createdAt:createdAt||'',subtasks:[]});
  }
  return T;
}
function parseSubtasks(rows,tasks){
  for(let i=1;i<rows.length;i++){
    const [id,taskId,user,title,done]=rows[i];
    if(!id||!taskId||!user||id.endsWith('-toggle')) continue;
    if(tasks[user]){const t=tasks[user].find(t=>t.id===taskId);if(t&&!t.subtasks.find(s=>s.id===id))t.subtasks.push({id,taskId,user,title,done:done==='TRUE'});}
  }
  return tasks;
}
function parseChallenges(rows){
  // Date,Prompt,User,Done
  const C={};
  for(let i=1;i<rows.length;i++){
    const [date,prompt,user,done]=rows[i];
    if(!date) continue;
    if(!C[date])C[date]={prompt:'',completions:{}};
    if(prompt)C[date].prompt=prompt;
    if(user)C[date].completions[user]=done==='TRUE';
  }
  return C;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data,color,W=200,H=50,target}){
  if(!data||data.length<2) return <div style={{width:W,height:H,display:'flex',alignItems:'center',justifyContent:'center',color:'#5f6470',fontSize:11}}>no data yet</div>;
  const vals=data.map(d=>d.v),min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const pad=6;
  const pts=data.map((d,i)=>({x:pad+((W-pad*2)/(data.length-1))*i,y:H-pad-((d.v-min)/rng)*(H-pad*2)}));
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=`${path} L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  const tY=target!=null?H-pad-((target-min)/rng)*(H-pad*2):null;
  const gid=`g${color.replace('#','')}${W}`;
  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      {tY!=null&&tY>0&&tY<H&&<line x1={pad} y1={tY} x2={W-pad} y2={tY} stroke="#e8b34e" strokeWidth="1" strokeDasharray="3,3" opacity="0.7"/>}
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={i===pts.length-1?3:2} fill={color}/>)}
    </svg>
  );
}

// ─── DONUT ────────────────────────────────────────────────────────────────────
function Donut({slices,size=100,label,value}){
  const total=slices.reduce((s,d)=>s+d.val,0)||1;
  const r=38,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  let off=0;
  const segs=slices.filter(d=>d.val>0).map(d=>{
    const dash=(d.val/total)*circ,o=off; off+=dash;
    return{...d,dash,gap:circ-dash,off:o};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2d35" strokeWidth={9}/>
      {segs.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={9}
          strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.off}
          transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt"/>
      ))}
      <circle cx={cx} cy={cy} r={r-5} fill="#15171c"/>
      {value&&<text x={cx} y={cy-4} textAnchor="middle" fill="#e7e9ee" fontSize="14" fontWeight="700" fontFamily="IBM Plex Mono">{value}</text>}
      {label&&<text x={cx} y={cy+12} textAnchor="middle" fill="#7c8493" fontSize="9" fontFamily="IBM Plex Mono">{label}</text>}
    </svg>
  );
}

// ─── XP RING ─────────────────────────────────────────────────────────────────
function XPRing({pct,xp,color,size=110}){
  const r=size/2-8,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#2a2d35" strokeWidth={8}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={8}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
        strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`} style={{transition:'stroke-dashoffset .5s ease'}}/>
      <text x={cx} y={cy-6} textAnchor="middle" dominantBaseline="central" fill="#e7e9ee" fontSize={size>100?16:13} fontWeight="700" fontFamily="IBM Plex Mono">{pct}%</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill={color} fontSize={size>100?13:11} fontWeight="600" fontFamily="IBM Plex Mono">{xp}xp</text>
    </svg>
  );
}

                  <div className="mono" style={{fontSize:9,color:'#7c8493'}}>{d.pct>0?`${d.pct}%`:''}</div>
                  <div style={{width:'100%',borderRadius:4,height:Math.max(3,(d.pct/mx)*44),background:d.pct===0?'#2a2d35':ac,transition:'height .3s'}}/>
                  <div className="mono" style={{fontSize:9,color:'#5f6470'}}>{fmtD(d.key).slice(0,1)}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Time today */}
        <div style={C.card({padding:'16px'})}>
          <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1.5,marginBottom:12}}>TIME TODAY</div>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:700,color:ac}}>{fmtM(habitMinsToday)||'—'}</div>
              <div className="mono" style={{fontSize:10,color:'#7c8493',marginTop:3}}>habits</div>
            </div>
            <div style={{width:1,background:'#2a2d35'}}/>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:700,color:'#7ad6a0'}}>{fmtM(taskMinsToday)||'—'}</div>
              <div className="mono" style={{fontSize:10,color:'#7c8493',marginTop:3}}>tasks</div>
            </div>
            <div style={{width:1,background:'#2a2d35'}}/>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:700,color:'#7eb8f7'}}>{fmtM(habitMinsToday+taskMinsToday)||'—'}</div>
              <div className="mono" style={{fontSize:10,color:'#7c8493',marginTop:3}}>total</div>
            </div>
          </div>
        </div>

        {/* Squad */}
        <div style={C.card({padding:'16px'})}>
          <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1.5,marginBottom:12}}>SQUAD TODAY</div>
          {USERS.map(u=>{
            const dl=(allLogsAll[u.name]||{})[dk]||{};
            let xp=0;HABIT_CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`]?.done)xp+=a.xp;}));
            const pct=TOTAL_XP?Math.round((xp/TOTAL_XP)*100):0;
            return(
              <div key={u.name} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:`${u.color}22`,border:`2px solid ${pct>0?u.color:'#2a2d35'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color:u.color}}>{u.name[0]}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12,fontWeight:500}}>
                    <span>{u.name}</span><span className="mono" style={{color:u.color}}>{pct}%</span>
                  </div>
                  <div style={{height:3,background:'#2a2d35',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:u.color,borderRadius:2,transition:'width .4s'}}/>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── COL 2 — Habits by section ── */}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* Picture a day */}
        {challenge?.prompt&&(
          <div style={C.card({padding:'14px',borderColor:'#e8b34e33'})}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              {I.Camera()}<span style={{fontWeight:600,fontSize:13}}>Picture a Day</span>
              {challenge.completions?.[cu.name]&&<span style={{...C.pill('#7ad6a0'),marginLeft:'auto'}}>✓ Done</span>}
            </div>
            <div style={{fontSize:13,color:'#c5cad3',marginBottom:10,fontStyle:'italic'}}>"{challenge.prompt}"</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {USERS.map(u=>{
                const done=challenge.completions?.[u.name];
                const isMe=u.name===cu.name;
                return(
                  <button key={u.name} onClick={()=>isMe&&!done&&onCompleteChallenge(dk,challenge.prompt,cu.name)}
                    style={{...C.pill(done?u.color:'#5f6470'),cursor:isMe&&!done?'pointer':'default'}}>
                    {u.name[0]} {done?'✓':'○'}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {HABIT_CATEGORIES.map(cat=>{
          const col=SC[cat.section]||ac;
          const total=cat.activities.reduce((s,a)=>s+a.xp,0);
          const earned=cat.activities.reduce((s,a)=>s+(myLog[`${cat.name}::${a.name}`]?.done?a.xp:0),0);
          return(
            <div key={cat.name} style={C.card({padding:'14px'})}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:col}}/>
                  <span style={{fontWeight:600,fontSize:13}}>{cat.section}</span>
                </div>
                <span className="mono" style={{fontSize:11,color:'#5f6470'}}>{earned}/{total} xp</span>
              </div>
              {cat.activities.map(act=>{
                const key=`${cat.name}::${act.name}`;
                const state=myLog[key]||{done:false,mins:0};
                return(
                  <button key={act.name} onClick={()=>handleHabitCheck(cat.name,act.name,act.xp,act.trackTime)}
                    style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'8px 10px',borderRadius:9,marginBottom:5,border:'1px solid '+(state.done?col+'55':'#2a2d35'),background:state.done?col+'12':'transparent',textAlign:'left',transition:'all .12s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:9}}>
                      <div style={{width:16,height:16,borderRadius:4,border:'1.5px solid '+(state.done?col:'#444955'),background:state.done?col:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#15171c',transition:'all .15s'}}>
                        {state.done&&I.Check(11)}
                      </div>
                      <span style={{fontSize:13,color:state.done?'#e7e9ee':'#c5cad3'}}>{act.name}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      {state.mins>0&&<span className="mono" style={{fontSize:10,color:col}}>{fmtM(state.mins)}</span>}
                      <span className="mono" style={{fontSize:11,color:state.done?col:'#5f6470'}}>+{act.xp}</span>
                    </div>
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* ── COL 3 — Tasks by section ── */}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* Starred tasks */}
        {myTasks.filter(t=>t.starred&&t.status==='active').length>0&&(
          <div style={C.card({padding:'14px',borderColor:'#e8b34e33'})}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:10}}>
              {I.Star(13,'#e8b34e')}<span style={{fontWeight:600,fontSize:13,color:'#e8b34e'}}>Starred</span>
            </div>
            {myTasks.filter(t=>t.starred&&t.status==='active').map(t=>(
              <TaskRow key={t.id} task={t} ac={ac} sc={SC} onComplete={()=>setTimeModal({type:'task',id:t.id,title:t.title})} onToggleSub={toggleSubtask} onStar={toggleStar} compact/>
            ))}
          </div>
        )}

        {/* Tasks grouped by section (only sections with tasks) */}
        {SECTIONS.filter(sec=>myTasks.some(t=>t.section===sec.name&&t.status==='active')).map(sec=>(
          <div key={sec.name} style={C.card({padding:'14px'})}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:sec.color}}/>
                <span style={{fontWeight:600,fontSize:13}}>{sec.name}</span>
                <span className="mono" style={{fontSize:10,color:'#5f6470'}}>{myTasks.filter(t=>t.section===sec.name&&t.status==='active').length}</span>
              </div>
              <button onClick={()=>{setTaskSection(sec.name);onAddTask();}} style={{color:'#5f6470',display:'flex',alignItems:'center'}}>{I.Plus(13)}</button>
            </div>
            {myTasks.filter(t=>t.section===sec.name&&t.status==='active').map(t=>(
              <TaskRow key={t.id} task={t} ac={ac} sc={SC} onComplete={()=>setTimeModal({type:'task',id:t.id,title:t.title})} onToggleSub={toggleSubtask} onStar={toggleStar} compact/>
            ))}
          </div>
        ))}

        {/* Add task prompt if no tasks yet */}
        {myTasks.filter(t=>t.status==='active').length===0&&(
          <div style={C.card({padding:'20px',textAlign:'center',borderStyle:'dashed'})}>
            <div style={{color:'#5f6470',fontSize:13,marginBottom:10}}>No active tasks</div>
            <button onClick={onAddTask} style={{...C.pill(ac,{cursor:'pointer',fontSize:13,padding:'6px 14px'})}}>
              {I.Plus(12)} Add a task
            </button>
          </div>
        )}

        {/* Recently completed */}
        {myTasks.filter(t=>t.status==='done').slice(-3).length>0&&(
          <div style={C.card({padding:'14px',opacity:0.7})}>
            <div className="mono" style={{fontSize:10,color:'#5f6470',letterSpacing:1,marginBottom:10}}>RECENTLY DONE</div>
            {myTasks.filter(t=>t.status==='done').slice(-3).reverse().map(t=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <div style={{width:15,height:15,borderRadius:4,background:'#7ad6a0',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#15171c'}}>{I.Check(9)}</div>
                <span style={{fontSize:12,color:'#5f6470',textDecoration:'line-through',flex:1}}>{t.title}</span>
                {t.actMins>0&&<span className="mono" style={{fontSize:10,color:'#5f6470'}}>{fmtM(t.actMins)}</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TASK ROW (shared) ────────────────────────────────────────────────────────
function TaskRow({task,ac,sc,onComplete,onToggleSub,onStar,compact,readOnly}){
  const [open,setOpen]=React.useState(false);
  const col=sc[task.section]||'#7c8493';
  const subDone=task.subtasks.filter(s=>s.done).length;
  return(
    <div style={{marginBottom:compact?6:8}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:8,padding:compact?'7px 8px':'10px 12px',borderRadius:9,border:'1px solid #2a2d35',background:'#15171c',transition:'border-color .15s'}}>
        {!readOnly&&(
          <button onClick={onComplete} style={{width:17,height:17,borderRadius:4,border:`1.5px solid ${col}`,background:'transparent',flexShrink:0,marginTop:1,cursor:'pointer'}}/>
        )}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:compact?12:14,fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</span>
            {task.starred&&<span style={{color:'#e8b34e',flexShrink:0}}>{I.Star(10,'#e8b34e')}</span>}
          </div>
          {!compact&&task.notes&&<div style={{fontSize:11,color:'#7c8493',marginTop:2}}>{task.notes}</div>}
          <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
            {!compact&&<span style={C.pill(col)}>{task.section}</span>}
            {task.dueDate&&<span className="mono" style={{fontSize:10,color:'#7c8493'}}>{fmtDS(task.dueDate)}</span>}
            {task.estMins>0&&<span className="mono" style={{fontSize:10,color:'#5f6470'}}>{I.Clock(10)} {fmtM(task.estMins)}</span>}
          </div>
          {task.subtasks.length>0&&(
            <button onClick={()=>setOpen(v=>!v)} style={{display:'flex',alignItems:'center',gap:4,marginTop:4,color:'#7c8493',fontSize:11}}>
              {I.ChevDown(11)} {subDone}/{task.subtasks.length} items
            </button>
          )}
          {open&&task.subtasks.map(st=>(
            <div key={st.id} style={{display:'flex',alignItems:'center',gap:7,marginTop:5}}>
              <button onClick={()=>!readOnly&&onToggleSub(task.id,st.id,task.user)} style={{width:13,height:13,borderRadius:3,border:'1.5px solid '+(st.done?'#7ad6a0':'#444955'),background:st.done?'#7ad6a0':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#15171c',cursor:readOnly?'default':'pointer'}}>
                {st.done&&I.Check(8)}
              </button>
              <span style={{fontSize:11,color:st.done?'#5f6470':'#c5cad3',textDecoration:st.done?'line-through':'none'}}>{st.title}</span>
            </div>
          ))}
        </div>
        {!readOnly&&<button onClick={()=>onStar&&onStar(task.id,task.user)} style={{color:task.starred?'#e8b34e':'#3a3d45',flexShrink:0}}>{I.Star(11,task.starred?'#e8b34e':'none')}</button>}
      </div>
    </div>
  );
}

// ─── MOBILE HOME ──────────────────────────────────────────────────────────────
function HomeMobile({cu,allLogs,tasks,challenges,ac,toggle,habitTimeLog,completeTask,toggleSubtask,toggleStar,onAddTask,earnedXP,fulfilment,last7,allLogsAll,onCompleteChallenge}){
  const [timeModal,setTimeModal]=React.useState(null);
  const dk=getDK(0);
  const myLog=(allLogs[cu.name]||{})[dk]||{};
  const myTasks=tasks[cu.name]||[];
  const challenge=challenges[dk];
  const streak=(()=>{let s=0;for(let i=0;i<last7.length;i++){const d=last7[last7.length-1-i];if(d.pct>0)s++;else break;}return s;})();

  return(
    <div className="fade">
      {timeModal&&<TimeModal label={timeModal.title} optional onClose={()=>setTimeModal(null)}
        onSubmit={(mins)=>{
          if(timeModal.type==='habit')toggle(timeModal.cat,timeModal.act,timeModal.xp,mins);
          else if(timeModal.type==='task')completeTask(timeModal.id,mins);
          setTimeModal(null);
        }}/>}

      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
        <XPRing pct={fulfilment} xp={earnedXP} color={ac} size={90}/>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700}}>Good {greeting}</div>
          <div className="mono" style={{fontSize:11,color:'#7c8493',marginBottom:8}}>{fmtD(dk)}</div>
          <div style={{display:'flex',gap:10}}>
            <div><div style={{fontSize:16,fontWeight:700,color:ac}}>{earnedXP}</div><div className="mono" style={{fontSize:9,color:'#7c8493'}}>XP</div></div>
            <div><div style={{fontSize:16,fontWeight:700,color:'#e8b34e'}}>{streak}d</div><div className="mono" style={{fontSize:9,color:'#7c8493'}}>streak</div></div>
          </div>
        </div>
      </div>

      {challenge?.prompt&&(
        <div style={C.card({padding:'12px',marginBottom:14,borderColor:'#e8b34e33'})}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            {I.Camera()}<span style={{fontWeight:600,fontSize:13}}>Picture a Day</span>
          </div>
          <div style={{fontSize:12,color:'#c5cad3',marginBottom:8,fontStyle:'italic'}}>"{challenge.prompt}"</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {USERS.map(u=>{
              const done=challenge.completions?.[u.name];
              const isMe=u.name===cu.name;
              return<button key={u.name} onClick={()=>isMe&&!done&&onCompleteChallenge(dk,challenge.prompt,cu.name)} style={{...C.pill(done?u.color:'#5f6470'),cursor:isMe&&!done?'pointer':'default'}}>{u.name[0]} {done?'✓':'○'}</button>;
            })}
          </div>
        </div>
      )}

      <div style={{fontWeight:600,fontSize:15,marginBottom:10}}>Daily Habits</div>
      {HABIT_CATEGORIES.map(cat=>{
        const col=SECTIONS.find(s=>s.name===cat.section)?.color||ac;
        return(
          <div key={cat.name} style={{marginBottom:14}}>
            <div style={{fontSize:11,color:'#9aa1ad',fontWeight:600,textTransform:'uppercase',letterSpacing:0.8,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:col}}/>{cat.section}
            </div>
            {cat.activities.map(act=>{
              const key=`${cat.name}::${act.name}`;
              const state=myLog[key]||{done:false,mins:0};
              return(
                <button key={act.name} onClick={()=>{const already=state.done;if(!already&&act.trackTime)setTimeModal({type:'habit',cat:cat.name,act:act.name,xp:act.xp,title:act.name});else toggle(cat.name,act.name,act.xp,0);}}
                  style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'10px 12px',borderRadius:10,marginBottom:6,border:'1px solid '+(state.done?col+'55':'#2a2d35'),background:state.done?col+'12':'#1c1f26',textAlign:'left',transition:'all .12s'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:17,height:17,borderRadius:4,border:'1.5px solid '+(state.done?col:'#444955'),background:state.done?col:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#15171c'}}>
                      {state.done&&I.Check()}
                    </div>
                    <span style={{fontSize:13,color:state.done?'#e7e9ee':'#c5cad3'}}>{act.name}</span>
                  </div>
                  <div style={{display:'flex',gap:5,alignItems:'center'}}>
                    {state.mins>0&&<span className="mono" style={{fontSize:10,color:col}}>{fmtM(state.mins)}</span>}
                    <span className="mono" style={{fontSize:11,color:state.done?col:'#5f6470'}}>+{act.xp}</span>
                  </div>
                </button>
              );
            })}
          </div>
        );
      })}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,marginTop:4}}>
        <div style={{fontWeight:600,fontSize:15}}>Tasks</div>
        <button onClick={onAddTask} style={{...C.pill(ac),cursor:'pointer'}}>{I.Plus(11)} Add</button>
      </div>
      {myTasks.filter(t=>t.status==='active').slice(0,5).map(t=>(
        <TaskRow key={t.id} task={t} ac={ac} sc={Object.fromEntries(SECTIONS.map(s=>[s.name,s.color]))} onComplete={()=>setTimeModal({type:'task',id:t.id,title:t.title})} onToggleSub={toggleSubtask} onStar={toggleStar} compact/>
      ))}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── TASKS TAB ────────────────────────────────────────────────────────────────
function TasksTab({cu,tasks,onAddTask,completeTask,toggleSubtask,deleteTask,toggleStar,readOnly,viewingUser,ac}){
  const [activeSection,setActiveSection]=React.useState('All');
  const [showDone,setShowDone]=React.useState(false);
  const [timeModal,setTimeModal]=React.useState(null);
  const uname=viewingUser?viewingUser.name:cu.name;
  const myTasks=tasks[uname]||[];
  const SC=Object.fromEntries(SECTIONS.map(s=>[s.name,s.color]));

  const filtered=myTasks.filter(t=>{
    if(!showDone&&t.status==='done')return false;
    if(showDone&&t.status!=='done')return false;
    if(activeSection!=='All'&&t.section!==activeSection)return false;
    return true;
  });

  return(
    <div className="fade">
      {timeModal&&<TimeModal label={timeModal.title} onClose={()=>setTimeModal(null)} onSubmit={(m)=>{completeTask(timeModal.id,m);setTimeModal(null);}}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:18}}>{readOnly?`${uname}'s Tasks`:'My Tasks'}</div>
        {!readOnly&&<button onClick={onAddTask} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:10,background:ac,color:'#15171c',fontSize:13,fontWeight:700,cursor:'pointer'}}>{I.Plus(14)} New Task</button>}
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,marginBottom:14}}>
        {['All',...TASK_SECTIONS].map(s=>{
          const cnt=s==='All'?myTasks.filter(t=>t.status==='active').length:myTasks.filter(t=>t.status==='active'&&t.section===s).length;
          const active=activeSection===s&&!showDone;
          const col=SC[s]||ac;
          return(
            <button key={s} onClick={()=>{setActiveSection(s);setShowDone(false);}} style={{flexShrink:0,padding:'5px 11px',borderRadius:20,border:'1px solid '+(active?col+'66':'#2a2d35'),background:active?col+'18':'transparent',color:active?col:'#9aa1ad',fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
              {s}{cnt>0?` ·${cnt}`:''}
            </button>
          );
        })}
        <button onClick={()=>setShowDone(v=>!v)} style={{flexShrink:0,padding:'5px 11px',borderRadius:20,border:'1px solid '+(showDone?'#7ad6a0':'#2a2d35'),background:showDone?'#7ad6a018':'transparent',color:showDone?'#7ad6a0':'#9aa1ad',fontSize:12,fontWeight:600,cursor:'pointer'}}>✓ Done</button>
      </div>
      {filtered.length===0&&<div style={C.card({padding:'30px',textAlign:'center',color:'#5f6470',fontSize:13})}>{showDone?'No completed tasks.':'Nothing here. Add a task!'}</div>}
      {filtered.map(t=>(
        <div key={t.id} style={{position:'relative'}}>
          <TaskRow task={t} ac={ac} sc={SC} onComplete={()=>!t.status==='done'&&setTimeModal({id:t.id,title:t.title})} onToggleSub={toggleSubtask} onStar={toggleStar} readOnly={readOnly}/>
          {!readOnly&&t.status==='active'&&(
            <div style={{position:'absolute',right:36,top:10,display:'flex',gap:6}}>
              <button onClick={()=>setTimeModal({id:t.id,title:t.title})} style={{...C.pill('#7ad6a0',{cursor:'pointer',fontSize:11})}}>{I.Check(10)} done</button>
            </div>
          )}
          {!readOnly&&<button onClick={()=>deleteTask(t.id,t.user)} style={{position:'absolute',right:8,top:10,color:'#3a3d45',display:'flex'}}>{I.Trash()}</button>}
        </div>
      ))}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── STATS TAB ────────────────────────────────────────────────────────────────
function StatsTab({cu,last7,catBreakdown,earnedXP,fulfilment,tasks,ac,allLogs}){
  const SC=Object.fromEntries(SECTIONS.map(s=>[s.name,s.color]));
  const myTasks=tasks[cu.name]||[];
  const doneTasks=myTasks.filter(t=>t.status==='done'&&t.actMins>0);
  const sectionTime={};
  doneTasks.forEach(t=>{sectionTime[t.section]=(sectionTime[t.section]||0)+t.actMins;});
  const totalAct=doneTasks.reduce((s,t)=>s+t.actMins,0);
  const totalEst=doneTasks.reduce((s,t)=>s+t.estMins,0);
  const maxPct=Math.max(...last7.map(d=>d.pct),1);
  const streak=(()=>{let s=0;for(let i=0;i<last7.length;i++){const d=last7[last7.length-1-i];if(d.pct>0)s++;else break;}return s;})();

  // habit time all days
  const habitTime={};
  const userLogs=allLogs[cu.name]||{};
  Object.values(userLogs).forEach(dayLog=>{
    Object.entries(dayLog).forEach(([key,state])=>{
      if(state.mins>0){
        const cat=HABIT_CATEGORIES.find(c=>c.activities.some(a=>`${c.name}::${a.name}`===key));
        if(cat){habitTime[cat.section]=(habitTime[cat.section]||0)+state.mins;}
      }
    });
  });

  return(
    <div className="fade">
      <div style={{fontWeight:700,fontSize:18,marginBottom:18}}>Your Stats</div>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'TODAY XP',v:earnedXP,s:`/ ${TOTAL_XP}`},{l:'FULFILMENT',v:`${fulfilment}%`,s:'today'},{l:'STREAK',v:`${streak}d`,s:'active'}].map(s=>(
          <div key={s.l} style={{flex:1,...C.card({padding:'12px'})}}>
            <div className="mono" style={{fontSize:9,color:'#7c8493',letterSpacing:1,marginBottom:5}}>{s.l}</div>
            <div style={{fontSize:20,fontWeight:700,color:ac}}>{s.v}</div>
            <div className="mono" style={{fontSize:9,color:'#5f6470',marginTop:2}}>{s.s}</div>
          </div>
        ))}
      </div>
      <div style={C.card({padding:'16px',marginBottom:14})}>
        <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1.5,marginBottom:14}}>LAST 7 DAYS</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,height:80}}>
          {last7.map(d=>(
            <div key={d.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div className="mono" style={{fontSize:9,color:'#7c8493'}}>{d.pct>0?`${d.pct}%`:''}</div>
              <div style={{width:'100%',borderRadius:4,height:Math.max(3,(d.pct/maxPct)*60),background:d.pct===0?'#2a2d35':ac,transition:'height .4s'}}/>
              <div className="mono" style={{fontSize:9,color:'#5f6470'}}>{fmtD(d.key).slice(0,3)}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={C.card({padding:'16px',marginBottom:14})}>
        <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1.5,marginBottom:12}}>HABIT BREAKDOWN</div>
        {catBreakdown.map(c=>(
          <div key={c.name} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12}}>
              <span style={{color:'#c5cad3'}}>{c.name}</span>
              <span className="mono" style={{color:'#7c8493'}}>{c.earned}/{c.total} · {c.pct}%</span>
            </div>
            <div style={{height:4,borderRadius:3,background:'#2a2d35',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${c.pct}%`,background:SC[HABIT_CATEGORIES.find(h=>h.name===c.name)?.section]||ac,borderRadius:3,transition:'width .4s'}}/>
            </div>
          </div>
        ))}
      </div>
      {(Object.keys(sectionTime).length>0||Object.keys(habitTime).length>0)&&(
        <div style={C.card({padding:'16px',marginBottom:14})}>
          <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1.5,marginBottom:14}}>TIME ANALYTICS</div>
          <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
            <Donut size={100} value={fmtM(totalAct)||'—'} label="tasks"
              slices={Object.entries(sectionTime).map(([s,v])=>({label:s,val:v,color:SC[s]||'#7c8493'}))}/>
            <div style={{flex:1}}>
              {totalEst>0&&<div className="mono" style={{fontSize:11,color:'#7c8493',marginBottom:8}}>Task accuracy: {Math.round(totalAct/totalEst*100)}%</div>}
              <div className="mono" style={{fontSize:10,color:'#5f6470',marginBottom:6}}>TASKS BY SECTION</div>
              {Object.entries(sectionTime).sort((a,b)=>b[1]-a[1]).map(([s,v])=>(
                <div key={s} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:7,height:7,borderRadius:2,background:SC[s]||'#7c8493'}}/>{s}</div>
                  <span className="mono" style={{color:'#7c8493'}}>{fmtM(v)}</span>
                </div>
              ))}
              {Object.keys(habitTime).length>0&&(
                <>
                  <div className="mono" style={{fontSize:10,color:'#5f6470',marginTop:8,marginBottom:6}}>HABIT TIME</div>
                  {Object.entries(habitTime).sort((a,b)=>b[1]-a[1]).map(([s,v])=>(
                    <div key={s} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:7,height:7,borderRadius:2,background:SC[s]||'#7c8493'}}/>{s}</div>
                      <span className="mono" style={{color:'#7c8493'}}>{fmtM(v)}</span>
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>
        </div>
      )}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── BODY TAB ─────────────────────────────────────────────────────────────────
function BodyTab({cu,measurements,targets,onLogMeasurements,onSaveTargets,ac,readOnly,viewingUser}){
  const [showLog,setShowLog]=React.useState(false);
  const [showTarget,setShowTarget]=React.useState(false);
  const [selectedArea,setSelectedArea]=React.useState('Weight');
  const uname=viewingUser?viewingUser.name:cu.name;
  const userM=measurements[uname]||{};
  const userT=targets[uname]||{};
  const sortedDates=Object.keys(userM).sort();
  const latestVals=MEASUREMENT_AREAS.reduce((acc,a)=>{
    let val=null,from=null;
    for(const d of sortedDates){if(userM[d]?.[a.name]!=null){val=userM[d][a.name];from=d;}}
    acc[a.name]={val,from};return acc;
  },{});
  const sparkData=sortedDates.map(d=>userM[d]?.[selectedArea]!=null?{d,v:userM[d][selectedArea]}:null).filter(Boolean);
  return(
    <div className="fade">
      {showLog&&<MeasLogModal lastVals={Object.fromEntries(MEASUREMENT_AREAS.map(a=>[a.name,latestVals[a.name]?.val]))} onClose={()=>setShowLog(false)} onSave={(date,entries)=>{onLogMeasurements(uname,date,entries);setShowLog(false);}}/>}
      {showTarget&&<TargetModal cur={userT} onClose={()=>setShowTarget(false)} onSave={(vals)=>{onSaveTargets(uname,vals);setShowTarget(false);}}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:18}}>Body</div>
        {!readOnly&&(
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowTarget(true)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:10,border:'1px solid #2a2d35',color:'#9aa1ad',fontSize:12,cursor:'pointer'}}>{I.Target()} Targets</button>
            <button onClick={()=>setShowLog(true)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:10,background:ac,color:'#15171c',fontSize:12,fontWeight:700,cursor:'pointer'}}>{I.Plus(12)} Log</button>
          </div>
        )}
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,marginBottom:14}}>
        {MEASUREMENT_AREAS.map(a=>(
          <button key={a.name} onClick={()=>setSelectedArea(a.name)} style={{flexShrink:0,padding:'5px 11px',borderRadius:20,border:'1px solid '+(selectedArea===a.name?ac+'66':'#2a2d35'),background:selectedArea===a.name?ac+'18':'transparent',color:selectedArea===a.name?ac:'#9aa1ad',fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
            {a.name}
          </button>
        ))}
      </div>
      <div style={C.card({padding:'16px',marginBottom:14})}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:600,fontSize:15}}>{selectedArea}</div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {userT[selectedArea]!=null&&<span className="mono" style={{fontSize:12,color:'#e8b34e'}}>↯ {userT[selectedArea]}</span>}
            {latestVals[selectedArea]?.val!=null&&<span className="mono" style={{fontSize:12,color:ac}}>{latestVals[selectedArea].val}</span>}
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <Sparkline data={sparkData} color={ac} W={Math.max(260,sparkData.length*40)} H={80} target={userT[selectedArea]??null}/>
        </div>
        {sparkData.length>0&&(
          <div style={{display:'flex',gap:10,overflowX:'auto',marginTop:10,paddingTop:10,borderTop:'1px solid #2a2d35'}}>
            {sparkData.map(d=>(
              <div key={d.d} style={{flexShrink:0,textAlign:'center'}}>
                <div className="mono" style={{fontSize:13,fontWeight:600,color:ac}}>{d.v}</div>
                <div className="mono" style={{fontSize:10,color:'#5f6470'}}>{fmtDS(d.d)}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1,marginBottom:10}}>ALL MEASUREMENTS</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {MEASUREMENT_AREAS.map(a=>{
          const l=latestVals[a.name];
          const t=userT[a.name];
          const allVals=sortedDates.map(d=>userM[d]?.[a.name]).filter(v=>v!=null);
          const prev=allVals.length>1?allVals[allVals.length-2]:null;
          const change=l?.val!=null&&prev!=null?+(l.val-prev).toFixed(2):null;
          const diff=l?.val!=null&&t!=null?+(l.val-t).toFixed(2):null;
          return(
            <div key={a.name} onClick={()=>setSelectedArea(a.name)} style={C.card({padding:'11px',cursor:'pointer',borderColor:selectedArea===a.name?ac+'44':'#2a2d35'})}>
              <div style={{fontSize:11,color:'#7c8493',marginBottom:3}}>{a.name}</div>
              <div style={{fontSize:19,fontWeight:700,color:l?.val!=null?ac:'#5f6470'}}>{l?.val??'—'}</div>
              <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap'}}>
                {change!=null&&<span className="mono" style={{fontSize:10,color:change>0?'#f08b8b':'#7ad6a0'}}>{change>0?'+':''}{change}</span>}
                {t!=null&&<span className="mono" style={{fontSize:10,color:'#5f6470'}}>↯{t}</span>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:80}}/>
    </div>
  );
}

// ─── SQUAD TAB ────────────────────────────────────────────────────────────────
function SquadTab({allLogs,challenges,cu,onSetChallenge,onCompleteChallenge}){
  const dk=getDK(0);
  const [prompt,setPrompt]=React.useState('');
  const [editing,setEditing]=React.useState(false);
  const challenge=challenges[dk];
  const scores=USERS.map(u=>{
    const dl=(allLogs[u.name]||{})[dk]||{};
    let xp=0;HABIT_CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`]?.done)xp+=a.xp;}));
    return{...u,xp,pct:TOTAL_XP?Math.round((xp/TOTAL_XP)*100):0};
  }).sort((a,b)=>b.xp-a.xp);
  return(
    <div className="fade">
      <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>Squad</div>
      <div className="mono" style={{fontSize:11,color:'#7c8493',marginBottom:18}}>{fmtD(dk)}</div>
      <div style={C.card({padding:'16px',marginBottom:16,borderColor:'#e8b34e33'})}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          {I.Camera()}<span style={{fontWeight:600,fontSize:14}}>Picture a Day</span>
          {cu.isAdmin&&<button onClick={()=>setEditing(v=>!v)} style={{marginLeft:'auto',...C.pill('#9aa1ad'),cursor:'pointer'}}>{I.Edit()} {challenge?.prompt?'Edit':'Set'}</button>}
        </div>
        {editing&&cu.isAdmin&&(
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input placeholder="Today's prompt…" value={prompt} onChange={e=>setPrompt(e.target.value)} style={C.inp({flex:1,fontSize:13})}/>
            <button onClick={()=>{if(prompt.trim()){onSetChallenge(dk,prompt.trim());setPrompt('');setEditing(false);}}} style={{padding:'8px 14px',borderRadius:10,background:'#e8b34e',color:'#15171c',fontWeight:700,fontSize:13,cursor:'pointer'}}>Set</button>
          </div>
        )}
        {challenge?.prompt?(
          <>
            <div style={{fontSize:14,color:'#c5cad3',marginBottom:12,fontStyle:'italic'}}>"{challenge.prompt}"</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {USERS.map(u=>{
                const done=challenge.completions?.[u.name];
                const isMe=u.name===cu.name;
                return(
                  <button key={u.name} onClick={()=>isMe&&!done&&onCompleteChallenge(dk,challenge.prompt,cu.name)}
                    style={{...C.pill(done?u.color:'#5f6470'),cursor:isMe&&!done?'pointer':'default',padding:'6px 12px',fontSize:12}}>
                    <div style={{width:6,height:6,borderRadius:'50%',background:done?u.color:'#5f6470'}}/> {u.name} {done?'✓':'○'}
                  </button>
                );
              })}
            </div>
          </>
        ):(
          <div style={{color:'#5f6470',fontSize:13}}>{cu.isAdmin?'Set a challenge for today.':'No challenge today.'}</div>
        )}
      </div>
      {scores.map((u,i)=>(
        <div key={u.name} style={C.card({padding:'14px 16px',marginBottom:10})}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="mono" style={{fontSize:18,fontWeight:700,color:i===0?'#e8b34e':i===1?'#9aa1ad':i===2?'#cd7f32':'#5f6470',width:24}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:u.color}}/><span style={{fontWeight:600,fontSize:14}}>{u.name}</span>
                </div>
                <span className="mono" style={{fontSize:12,color:u.color}}>{u.xp} XP · {u.pct}%</span>
              </div>
              <div style={{height:4,background:'#2a2d35',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${u.pct}%`,background:u.color,borderRadius:3,transition:'width .5s'}}/>
              </div>
            </div>
          </div>
        </div>
      ))}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [cu,setCu]=React.useState(()=>{try{const s=localStorage.getItem('ql_user');return s?JSON.parse(s):null;}catch{return null;}});
  const [viewingUser,setViewingUser]=React.useState(null);
  const [tab,setTab]=React.useState('home');
  const [allLogs,setAllLogs]=React.useState({});
  const [measurements,setMeasurements]=React.useState({});
  const [targets,setTargets]=React.useState({});
  const [tasks,setTasks]=React.useState({});
  const [challenges,setChallenges]=React.useState({});
  const [loading,setLoading]=React.useState(true);
  const [syncing,setSyncing]=React.useState(false);
  const [error,setError]=React.useState(null);
  const [isMobile,setIsMobile]=React.useState(window.innerWidth<768);
  const [showUserPicker,setShowUserPicker]=React.useState(false);
  const [showAddTask,setShowAddTask]=React.useState(false);
  const [taskSection,setTaskSection]=React.useState(null);

  React.useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  function login(u){localStorage.setItem('ql_user',JSON.stringify(u));setCu(u);setViewingUser(null);}
  function logout(){localStorage.removeItem('ql_user');setCu(null);setViewingUser(null);}

  const activeUser=viewingUser||cu;
  const readOnly=viewingUser!==null;
  const ac=USERS.find(u=>u.name===activeUser?.name)?.color||'#e8b34e';

  const loadData=React.useCallback(async()=>{
    try{
      setLoading(true);setError(null);
      const [lr,mr,tr,taskR,stR,chR]=await Promise.all([
        readSheet('Daily Log'),readSheet('Measurements'),readSheet('Targets'),
        readSheet('Tasks'),readSheet('Subtasks'),readSheet('Challenge')
      ]);
      setAllLogs(parseLog(lr));
      setMeasurements(parseMeas(mr));
      setTargets(parseTargets(tr));
      const pt=parseTasks(taskR);
      parseSubtasks(stR,pt);
      setTasks(pt);
      setChallenges(parseChallenges(chR));
    }catch(e){setError('Could not reach Google Sheets.');}
    finally{setLoading(false);}
  },[]);

  React.useEffect(()=>{if(cu)loadData();},[cu,loadData]);

  // derived
  const userLogs=allLogs[activeUser?.name]||{};
  const dayLog=(userLogs[TODAY])||{};
  const earnedXP=React.useMemo(()=>{let s=0;HABIT_CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dayLog[`${c.name}::${a.name}`]?.done)s+=a.xp;}));return s;},[dayLog]);
  const fulfilment=TOTAL_XP?Math.round((earnedXP/TOTAL_XP)*100):0;
  const catBreakdown=React.useMemo(()=>HABIT_CATEGORIES.map(c=>{const total=c.activities.reduce((s,a)=>s+a.xp,0);const earned=c.activities.reduce((s,a)=>s+(dayLog[`${c.name}::${a.name}`]?.done?a.xp:0),0);return{name:c.name,total,earned,pct:total?Math.round((earned/total)*100):0};}),[dayLog]);
  const last7=React.useMemo(()=>Array.from({length:7},(_,i)=>{const k=getDK(i-6);const dl=userLogs[k]||{};let s=0;HABIT_CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`]?.done)s+=a.xp;}));return{key:k,pct:TOTAL_XP?Math.round((s/TOTAL_XP)*100):0};}),[userLogs]);

  // actions
  const toggle=React.useCallback(async(catName,actName,xp,mins)=>{
    if(readOnly)return;
    const key=`${catName}::${actName}`,uname=cu.name;
    const current=((allLogs[uname]||{})[TODAY]||{})[key]||{done:false,mins:0};
    const next={done:!current.done,mins:current.done?0:(mins||0)};
    setAllLogs(prev=>({...prev,[uname]:{...(prev[uname]||{}),[TODAY]:{...((prev[uname]||{})[TODAY]||{}),[key]:next}}}));
    setSyncing(true);
    try{await appendRow('Daily Log',[TODAY,uname,catName,actName,xp,next.done?'TRUE':'FALSE',next.mins||'']);}
    catch(e){setAllLogs(prev=>({...prev,[uname]:{...(prev[uname]||{}),[TODAY]:{...((prev[uname]||{})[TODAY]||{}),[key]:current}}}));setError('Sync failed.');}
    finally{setSyncing(false);}
  },[readOnly,cu,allLogs]);

  const addTask=React.useCallback(async(data)=>{
    if(readOnly)return;
    const uname=cu.name,id=uid(),now=new Date().toISOString();
    const task={id,user:uname,...data,actMins:0,status:'active',completedAt:'',createdAt:now,subtasks:data.subtasks||[]};
    setTasks(prev=>({...prev,[uname]:[...(prev[uname]||[]),task]}));
    setShowAddTask(false);
    setSyncing(true);
    try{
      await appendRow('Tasks',[id,uname,data.title,data.notes||'',data.section,data.dueDate||'',data.estMins||0,'',data.starred?'TRUE':'FALSE','active','',now]);
      for(const st of (data.subtasks||[]))await appendRow('Subtasks',[st.id,id,uname,st.title,'FALSE']);
    }catch(e){setError('Task save failed.');}
    finally{setSyncing(false);}
  },[readOnly,cu]);

  const completeTask=React.useCallback(async(taskId,actMins)=>{
    if(readOnly)return;
    const uname=cu.name,now=new Date().toISOString();
    setTasks(prev=>{const ut=[...(prev[uname]||[])];const idx=ut.findIndex(t=>t.id===taskId);if(idx>-1)ut[idx]={...ut[idx],status:'done',actMins,completedAt:now};return{...prev,[uname]:ut};});
    setSyncing(true);
    try{await appendRow('Tasks',[taskId+'-done',uname,'','','','','',actMins,'','done',now,'']);}
    catch(e){setError('Complete failed.');}
    finally{setSyncing(false);}
  },[readOnly,cu]);

  const toggleSubtask=React.useCallback(async(taskId,subtaskId,uname)=>{
    setTasks(prev=>{const ut=[...(prev[uname]||[])];const ti=ut.findIndex(t=>t.id===taskId);if(ti>-1){const st=[...ut[ti].subtasks];const si=st.findIndex(s=>s.id===subtaskId);if(si>-1)st[si]={...st[si],done:!st[si].done};ut[ti]={...ut[ti],subtasks:st};}return{...prev,[uname]:ut};});
    setSyncing(true);
    try{await appendRow('Subtasks',[subtaskId+'-toggle',taskId,uname,'','TOGGLE']);}
    catch(e){setError('Subtask failed.');}
    finally{setSyncing(false);}
  },[]);

  const deleteTask=React.useCallback((taskId,uname)=>{setTasks(prev=>({...prev,[uname]:(prev[uname]||[]).filter(t=>t.id!==taskId)}));},[]);
  const toggleStar=React.useCallback((taskId,uname)=>{setTasks(prev=>{const ut=[...(prev[uname]||[])];const i=ut.findIndex(t=>t.id===taskId);if(i>-1)ut[i]={...ut[i],starred:!ut[i].starred};return{...prev,[uname]:ut};});},[]);

  const logMeasurements=React.useCallback(async(uname,date,entries)=>{
    setMeasurements(prev=>{const day={...((prev[uname]||{})[date]||{})};entries.forEach(([a,v])=>{day[a]=parseFloat(v);});return{...prev,[uname]:{...(prev[uname]||{}),[date]:day}};});
    setSyncing(true);
    try{for(const [a,v] of entries)await appendRow('Measurements',[date,uname,a,parseFloat(v),'']);}
    catch(e){setError('Meas save failed.');}
    finally{setSyncing(false);}
  },[]);

  const saveTargets=React.useCallback(async(uname,vals)=>{
    const entries=Object.entries(vals).filter(([,v])=>v!=='');
    setTargets(prev=>({...prev,[uname]:{...(prev[uname]||{}),...Object.fromEntries(entries.map(([k,v])=>[k,parseFloat(v)||null]))}}));
    setSyncing(true);
    try{for(const [a,v] of entries)await appendRow('Targets',[uname,a,parseFloat(v)]);}
    catch(e){setError('Target save failed.');}
    finally{setSyncing(false);}
  },[]);

  const setChallenge=React.useCallback(async(date,prompt)=>{
    setChallenges(prev=>({...prev,[date]:{...(prev[date]||{completions:{}}),prompt}}));
    setSyncing(true);
    try{await appendRow('Challenge',[date,prompt,'','']);}
    catch(e){setError('Challenge failed.');}
    finally{setSyncing(false);}
  },[]);

  const completeChallenge=React.useCallback(async(date,prompt,uname)=>{
    setChallenges(prev=>({...prev,[date]:{...(prev[date]||{}),completions:{...((prev[date]||{}).completions||{}),[uname]:true}}}));
    setSyncing(true);
    try{await appendRow('Challenge',[date,prompt,uname,'TRUE']);}
    catch(e){setError('Challenge failed.');}
    finally{setSyncing(false);}
  },[]);

  if(!cu)return<Login onLogin={login}/>;
  if(loading)return(
    <div style={{background:'#15171c',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
      <div className="spin" style={{display:'flex',color:'#e8b34e'}}>{I.Loader(32)}</div>
      <div className="mono" style={{color:'#7c8493',fontSize:13}}>Loading Quest Log…</div>
    </div>
  );

  const TABS=[
    {id:'home',label:'Home',icon:I.Home},
    {id:'tasks',label:'Tasks',icon:I.Task},
    {id:'stats',label:'Stats',icon:I.Activity},
    {id:'body',label:'Body',icon:I.Ruler},
    {id:'squad',label:'Squad',icon:I.Users},
  ];

  const sharedTaskProps={cu,tasks,completeTask,toggleSubtask,deleteTask,toggleStar,readOnly,viewingUser,ac};
  const homeProps={cu,allLogs:userLogs,tasks,challenges,measurements,targets,ac,toggle,earnedXP,fulfilment,last7,allLogsAll:allLogs,onCompleteChallenge:completeChallenge,onAddTask:()=>setShowAddTask(true),setTaskSection,completeTask,toggleSubtask,toggleStar};

  return(
    <div style={{background:'#15171c',color:'#e7e9ee',minHeight:'100vh'}}>
      {showAddTask&&<AddTaskModal defaultSection={taskSection||'Work'} onClose={()=>{setShowAddTask(false);setTaskSection(null);}} onSave={addTask}/>}

      {/* HEADER */}
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(21,23,28,0.95)',backdropFilter:'blur(12px)',borderBottom:'1px solid #1f2228',padding:isMobile?'12px 16px':'12px 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:isMobile?10:24}}>
          <div>
            <div className="mono" style={{fontSize:9,color:'#5f6470',letterSpacing:2}}>QUEST LOG</div>
            <div style={{fontSize:isMobile?15:17,fontWeight:700}}>{activeUser?.name}</div>
          </div>
          {!isMobile&&TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:9,border:'1px solid '+(tab===t.id?ac+'44':'transparent'),background:tab===t.id?ac+'14':'transparent',color:tab===t.id?ac:'#9aa1ad',fontSize:13,fontWeight:600,transition:'all .15s'}}>
              {t.icon(14)}{t.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {syncing&&<div className="spin" style={{display:'flex',opacity:0.6}}>{I.Loader(14,ac)}</div>}
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowUserPicker(v=>!v)} style={{width:32,height:32,borderRadius:'50%',background:ac+'22',border:`2px solid ${ac}`,display:'flex',alignItems:'center',justifyContent:'center',color:ac,fontWeight:700,fontSize:13}}>
              {activeUser?.name[0]}
            </button>
            {showUserPicker&&(
              <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:14,padding:10,zIndex:300,minWidth:170,boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}>
                <div style={{fontSize:10,color:'#5f6470',padding:'2px 8px 8px',fontWeight:600,fontFamily:'IBM Plex Mono',letterSpacing:1}}>VIEW AS</div>
                {USERS.map(u=>(
                  <button key={u.name} onClick={()=>{setViewingUser(u.name===cu.name?null:u);setShowUserPicker(false);setTab('home');}} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:8,background:activeUser?.name===u.name?u.color+'18':'transparent',color:'#e7e9ee',fontSize:13,fontWeight:500,textAlign:'left'}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:u.color}}/>{u.name}{u.name===cu.name&&<span style={{fontSize:10,color:'#5f6470',marginLeft:'auto'}}>you</span>}
                  </button>
                ))}
                <div style={{borderTop:'1px solid #2a2d35',marginTop:8,paddingTop:8}}>
                  <button onClick={()=>{setShowUserPicker(false);logout();}} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:8,color:'#f08b8b',fontSize:13}}>
                    {I.Logout()} Sign out
                  </button>
                </div>
              </div>
            )}
          </div>
          <button onClick={loadData} style={{...C.nb}}>{I.Refresh()}</button>
        </div>
      </div>

      {error&&<div style={{margin:'8px 16px',padding:'10px 14px',borderRadius:10,background:'rgba(240,100,100,0.1)',border:'1px solid rgba(240,100,100,0.3)',fontSize:13,color:'#f08b8b',display:'flex',justifyContent:'space-between'}}>
        {error}<button onClick={()=>setError(null)} style={{color:'#f08b8b'}}>{I.X()}</button>
      </div>}

      {showUserPicker&&<div onClick={()=>setShowUserPicker(false)} style={{position:'fixed',inset:0,zIndex:100}}/>}

      {/* CONTENT */}
      <div style={{padding:isMobile?'16px 16px 0':'20px 32px 0',maxWidth:isMobile?'100%':1400,margin:'0 auto'}}>
        {tab==='home'&&(
          isMobile
            ?<HomeMobile {...homeProps}/>
            :<HomeDesktop {...homeProps}/>
        )}
        {tab==='tasks'&&<TasksTab {...sharedTaskProps} onAddTask={()=>setShowAddTask(true)}/>}
        {tab==='stats'&&<StatsTab cu={cu} last7={last7} catBreakdown={catBreakdown} earnedXP={earnedXP} fulfilment={fulfilment} tasks={tasks} ac={ac} allLogs={allLogs}/>}
        {tab==='body'&&<BodyTab cu={cu} measurements={measurements} targets={targets} onLogMeasurements={logMeasurements} onSaveTargets={saveTargets} ac={ac} readOnly={readOnly} viewingUser={viewingUser}/>}
        {tab==='squad'&&<SquadTab allLogs={allLogs} challenges={challenges} cu={cu} onSetChallenge={setChallenge} onCompleteChallenge={completeChallenge}/>}
      </div>

      {/* MOBILE BOTTOM NAV */}
      {isMobile&&(
        <>
          <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(28,31,38,0.97)',backdropFilter:'blur(12px)',borderTop:'1px solid #2a2d35',display:'flex',padding:'8px 0 20px',zIndex:100}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===t.id?ac:'#5f6470',fontSize:10,fontWeight:600,transition:'color .15s'}}>
                {t.icon(tab===t.id?20:18)}{t.label}
              </button>
            ))}
          </div>
          <button onClick={()=>setShowAddTask(true)} style={{position:'fixed',bottom:78,right:18,width:48,height:48,borderRadius:'50%',background:ac,color:'#15171c',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 20px ${ac}66`,zIndex:90,cursor:'pointer'}}>
            {I.Plus(20)}
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
