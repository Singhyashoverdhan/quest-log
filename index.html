// ─── GOOGLE SHEETS AUTH (JWT via Web Crypto) ─────────────────────────────────
async function getAccessToken() {
  const now = Math.floor(Date.now() / 1000);
  const encode = obj => btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const header = encode({ alg: 'RS256', typ: 'JWT' });
  const claim  = encode({ iss: CLIENT_EMAIL, scope: 'https://www.googleapis.com/auth/spreadsheets', aud: 'https://oauth2.googleapis.com/token', exp: now+3600, iat: now });
  const unsigned = `${header}.${claim}`;
  const pemBody = PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('pkcs8', bin.buffer, { name:'RSASSA-PKCS1-v1_5', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(unsigned));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt = `${unsigned}.${sigB64}`;
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  return data.access_token;
}
async function readSheet(tab) {
  const token = await getAccessToken();
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}`, { headers:{ Authorization:`Bearer ${token}` }});
  const d = await res.json();
  return d.values || [];
}
async function appendRow(tab, values) {
  const token = await getAccessToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}:append?valueInputOption=USER_ENTERED`, {
    method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
    body: JSON.stringify({ values:[values] })
  });
}

function getDateKey(offset=0) {
  const d = new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().slice(0,10);
}
function fmtDate(key) {
  return new Date(key+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function parseLogRows(rows) {
  const logs = {};
  for (let i=1;i<rows.length;i++) {
    const [date,cat,act,,completed]=rows[i];
    if (!date||!cat||!act) continue;
    if (!logs[date]) logs[date]={};
    logs[date][`${cat}::${act}`] = completed==='TRUE'||completed===true;
  }
  return logs;
}
function parseMeasRows(rows) {
  const m={};
  for (let i=1;i<rows.length;i++) {
    const [date,area,value]=rows[i];
    if (!date||!area||value==null) continue;
    if (!m[date]) m[date]={};
    m[date][area]=parseFloat(value);
  }
  return m;
}

          <div key={area.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{area.name}</div>
              <div style={{fontSize:11,color:'#7c8493',marginTop:2}}>{area.note}</div>
              <div className="mono" style={{fontSize:11,color:'#5f6470',marginTop:2}}>last: {l.val} cm · {l.from==='baseline'?'baseline':fmtDate(l.from)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <input type="number" step="0.1" placeholder={String(l.val)} value={current??''}
                onChange={e=>saveMeasurement(area.name,e.target.value)}
                className="mono"
                style={{width:80,padding:'8px 10px',borderRadius:8,border:'1px solid #2a2d35',background:'#15171c',color:'#e7e9ee',fontSize:14,textAlign:'right',outline:'none'}}/>
              {diff!=null&&diff!==0&&<span className="mono" style={{fontSize:11,color:diff>0?'#7ad6a0':'#f08b8b'}}>{diff>0?'+':''}{diff}</span>}
            </div>
          </div>
        );
      })}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState('log');
  const [dayOffset, setDayOffset] = React.useState(0);
  const [logs, setLogs] = React.useState({});
  const [measurements, setMeasurements] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [syncing, setSyncing] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [isMobile, setIsMobile] = React.useState(window.innerWidth < 640);

  React.useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h);
  },[]);

  const dateKey = getDateKey(dayOffset);

  const loadData = React.useCallback(async()=>{
    try { setLoading(true); setError(null);
      const [lr,mr]=await Promise.all([readSheet('Daily Log'),readSheet('Measurements')]);
      setLogs(parseLogRows(lr)); setMeasurements(parseMeasRows(mr));
    } catch(e){ setError('Could not reach Google Sheets. Check connection.'); }
    finally { setLoading(false); }
  },[]);

  React.useEffect(()=>{ loadData(); },[loadData]);

  const dayLog = logs[dateKey]||{};

  const earnedXP = React.useMemo(()=>{
    let s=0; CATEGORIES.forEach(c=>c.activities.forEach(a=>{ if(dayLog[`${c.name}::${a.name}`]) s+=a.xp; })); return s;
  },[dayLog]);
  const fulfilment = TOTAL_XP?Math.round((earnedXP/TOTAL_XP)*100):0;

  const catBreakdown = React.useMemo(()=>CATEGORIES.map(c=>{
    const total=c.activities.reduce((s,a)=>s+a.xp,0);
    const earned=c.activities.reduce((s,a)=>s+(dayLog[`${c.name}::${a.name}`]?a.xp:0),0);
    return {name:c.name,total,earned,pct:total?Math.round((earned/total)*100):0};
  }),[dayLog]);

  const last7 = React.useMemo(()=>Array.from({length:7},(_,i)=>{
    const k=getDateKey(i-6); const dl=logs[k]||{}; let s=0;
    CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`])s+=a.xp;}));
    return {key:k,pct:TOTAL_XP?Math.round((s/TOTAL_XP)*100):0};
  }),[logs]);

  const latestM = React.useMemo(()=>{
    const dates=Object.keys(measurements).sort();
    return MEASUREMENT_AREAS.reduce((acc,area)=>{
      let val=area.base,from='baseline';
      for(const d of dates){if(measurements[d]?.[area.name]!=null){val=measurements[d][area.name];from=d;}}
      acc[area.name]={val,from}; return acc;
    },{});
  },[measurements]);

  const toggle = React.useCallback(async(catName,actName,xp)=>{
    const key=`${catName}::${actName}`, current=!!(logs[dateKey]||{})[key], next=!current;
    setLogs(prev=>({...prev,[dateKey]:{...(prev[dateKey]||{}),[key]:next}}));
    setSyncing(true);
    try { await appendRow('Daily Log',[dateKey,catName,actName,xp,next?'TRUE':'FALSE']); }
    catch(e){ setLogs(prev=>({...prev,[dateKey]:{...(prev[dateKey]||{}),[key]:current}})); setError('Sync failed.'); }
    finally { setSyncing(false); }
  },[logs,dateKey]);

  const saveMeasurement = React.useCallback(async(areaName,value)=>{
    const v=value===''?null:parseFloat(value);
    setMeasurements(prev=>{const day={...(prev[dateKey]||{})};if(v==null)delete day[areaName];else day[areaName]=v;return{...prev,[dateKey]:day};});
    if(v!=null){setSyncing(true);try{await appendRow('Measurements',[dateKey,areaName,v]);}catch(e){setError('Sync failed.');}finally{setSyncing(false);}}
  },[dateKey]);

  if(loading) return (
    <div style={{background:'#15171c',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div className="spin" style={{display:'flex'}}><Icon.Loader/></div>
      <div className="mono" style={{color:'#7c8493',fontSize:13}}>Connecting to Quest Log…</div>
    </div>
  );

  const TABS = [
    {id:'log',label:'Today',Icon:Icon.Today},
    {id:'dashboard',label:'Stats',Icon:Icon.Activity},
    {id:'measurements',label:'Body',Icon:Icon.Ruler},
  ];

  const contentProps = { dateKey,dayOffset,setDayOffset,dayLog,toggle,earnedXP,fulfilment,catBreakdown,last7,measurements,latestM,saveMeasurement };

  return (
    <div style={{background:'#15171c',color:'#e7e9ee',minHeight:'100vh',maxWidth:isMobile?'100%':860,margin:'0 auto'}}>
      {/* Header */}
      <div style={{padding:isMobile?'24px 18px 12px':'32px 40px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div className="mono" style={{fontSize:11,color:'#7c8493',letterSpacing:2,marginBottom:3}}>DAY IN LIFE</div>
          <div style={{fontSize:isMobile?22:28,fontWeight:700}}>Quest Log</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {syncing&&<div className="spin" style={{display:'flex',opacity:0.7}}><Icon.Loader/></div>}
          <button onClick={loadData} style={{...navBtnStyle,color:'#9aa1ad'}}><Icon.Refresh/></button>
        </div>
      </div>

      {error&&<div style={{margin:'0 18px 12px',padding:'10px 14px',borderRadius:10,background:'rgba(240,100,100,0.1)',border:'1px solid rgba(240,100,100,0.3)',fontSize:13,color:'#f08b8b',display:'flex',justifyContent:'space-between'}}>
        {error}<button onClick={()=>setError(null)} style={{background:'none',border:'none',color:'#f08b8b',cursor:'pointer'}}>✕</button>
      </div>}

      {isMobile ? (
        <>
          <div style={{padding:'0 18px 16px'}}>
            {tab==='log'&&<LogTab {...contentProps}/>}
            {tab==='dashboard'&&<DashboardTab {...contentProps}/>}
            {tab==='measurements'&&<MeasurementsTab {...contentProps}/>}
          </div>
          <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#1c1f26',borderTop:'1px solid #2a2d35',display:'flex',padding:'10px 0 20px',zIndex:100}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',color:tab===t.id?'#e8b34e':'#5f6470',fontSize:11,fontWeight:600,cursor:'pointer',transition:'color .15s'}}>
                <t.Icon/>{t.label}
              </button>
            ))}
          </div>
        </>
      ) : (
        <div style={{display:'flex'}}>
          <div style={{width:180,padding:'8px 16px',flexShrink:0}}>
            <div style={{display:'flex',flexDirection:'column',gap:4,position:'sticky',top:32}}>
              {TABS.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,border:'1px solid '+(tab===t.id?'#e8b34e':'transparent'),background:tab===t.id?'rgba(232,179,78,0.10)':'transparent',color:tab===t.id?'#e8b34e':'#9aa1ad',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
                  <t.Icon/>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,padding:'8px 40px 60px 24px'}}>
            {tab==='log'&&<LogTab {...contentProps}/>}
            {tab==='dashboard'&&<DashboardTab {...contentProps}/>}
            {tab==='measurements'&&<MeasurementsTab {...contentProps}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
