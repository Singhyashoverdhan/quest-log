// ─── SHEETS API ───────────────────────────────────────────────────────────────
async function getAccessToken() {
  const now = Math.floor(Date.now()/1000);
  const encode = obj => btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const header = encode({alg:'RS256',typ:'JWT'});
  const claim  = encode({iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
  const unsigned = `${header}.${claim}`;
  const pemBody = PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin = Uint8Array.from(atob(pemBody),c=>c.charCodeAt(0));
  const key = await crypto.subtle.importKey('pkcs8',bin.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(unsigned));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const res = await fetch('https://oauth2.googleapis.com/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${unsigned}.${sigB64}`
  });
  return (await res.json()).access_token;
}
async function readSheet(tab) {
  const token = await getAccessToken();
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}`,{headers:{Authorization:`Bearer ${token}`}});
  return (await res.json()).values || [];
}
async function appendRow(tab, values) {
  const token = await getAccessToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}:append?valueInputOption=USER_ENTERED`,{
    method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({values:[values]})
  });
}

function getDateKey(offset=0) {
  const d=new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().slice(0,10);
}
function fmtDate(key) {
  return new Date(key+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function parseLogRows(rows) {
  const logs={};
  for(let i=1;i<rows.length;i++){
    const [date,user,cat,act,,completed]=rows[i];
    if(!date||!user||!cat||!act) continue;
    if(!logs[user]) logs[user]={};
    if(!logs[user][date]) logs[user][date]={};
    logs[user][date][`${cat}::${act}`]=completed==='TRUE'||completed===true;
  }
  return logs;
}
function parseMeasRows(rows) {
  const m={};
  for(let i=1;i<rows.length;i++){
    const [date,user,area,value]=rows[i];
    if(!date||!user||!area||value==null) continue;
    if(!m[user]) m[user]={};
    if(!m[user][date]) m[user][date]={};
    m[user][date][area]=parseFloat(value);
  }
  return m;
}

function LoginScreen({ onLogin }) {
  const [selected, setSelected] = React.useState(null);
  const [pin, setPin] = React.useState('');
  const [error, setError] = React.useState(false);
  const [shakeKey, setShakeKey] = React.useState(0);

  function handlePinDigit(d) {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        const user = USERS.find(u => u.name === selected);
        if (user && user.pin === next) {
          onLogin(user);
        } else {
          setError(true);
          setShakeKey(k => k+1);
          setTimeout(() => { setPin(''); setError(false); }, 600);
        }
      }, 100);
    }
  }

  function handleBack() {
    setPin(p => p.slice(0,-1));

                <span>{u.name}</span>

      ) : (
        <div className="fade" style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',alignItems:'center'}}>

              <div className="mono" style={{fontSize:11,color:'#5f6470'}}>{cb.earned}/{cb.total} XP</div>
            </div>
            <div style={{height:3,background:'#2a2d35',borderRadius:3,marginBottom:8,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${cb.pct}%`,background:accentColor,borderRadius:3,transition:'width .3s'}}/>
            </div>
            {cat.activities.map(act => {
              const key=`${cat.name}::${act.name}`, checked=!!dayLog[key];
              return (
                <button key={act.name}
                  onClick={()=>!readOnly&&toggle(cat.name,act.name,act.xp)}
                  style={{
                    display:'flex',alignItems:'center',justifyContent:'space-between',
                    width:'100%',padding:'11px 14px',borderRadius:10,marginBottom:6,
                    border:'1px solid '+(checked?accentColor+'66':'#2a2d35'),
                    background:checked?accentColor+'18':'#1c1f26',
                    textAlign:'left',transition:'all .12s',
                    cursor:readOnly?'default':'pointer',opacity:readOnly?0.8:1
                  }}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:18,height:18,borderRadius:5,border:'1.5px solid '+(checked?accentColor:'#444955'),background:checked?accentColor:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#15171c'}}>
                      {checked&&<IC.Check/>}
                    </div>
                    <span style={{fontSize:14,color:checked?'#e7e9ee':'#c5cad3'}}>{act.name}</span>
                  </div>
                  <span className="mono" style={{fontSize:12,color:checked?accentColor:'#5f6470'}}>+{act.xp}</span>
                </button>
              );
            })}
          </div>
        );
      })}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── DASHBOARD TAB ────────────────────────────────────────────────────────────
function DashboardTab({ last7, catBreakdown, earnedXP, fulfilment, accentColor }) {
  const maxPct=Math.max(...last7.map(d=>d.pct),1);
  const streak=(()=>{let s=0;for(let i=last7.length-1;i>=0;i--){if(last7[i].pct>0)s++;else break;}return s;})();
  return (
    <div className="fade">
      <div style={{display:'flex',gap:10,marginBottom:20}}>
        {[{label:'TODAY XP',value:earnedXP,sub:`/ ${TOTAL_XP}`},{label:'FULFILMENT',value:`${fulfilment}%`,sub:'today'},{label:'STREAK',value:`${streak}d`,sub:'days'}].map(s=>(
          <div key={s.label} style={{flex:1,background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:14,padding:'14px 12px'}}>
            <div className="mono" style={{fontSize:10,color:'#7c8493',letterSpacing:1,marginBottom:6}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:700,color:accentColor}}>{s.value}</div>
            <div className="mono" style={{fontSize:10,color:'#5f6470',marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:16,padding:'18px 16px',marginBottom:20}}>
        <div className="mono" style={{fontSize:11,color:'#7c8493',letterSpacing:1.5,marginBottom:16}}>LAST 7 DAYS</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100}}>
          {last7.map(d=>(
            <div key={d.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
              <div className="mono" style={{fontSize:10,color:'#7c8493'}}>{d.pct>0?`${d.pct}%`:''}</div>
              <div style={{width:'100%',borderRadius:5,height:Math.max(4,(d.pct/maxPct)*72),background:d.pct===0?'#2a2d35':accentColor,transition:'height .4s ease'}}/>
              <div className="mono" style={{fontSize:10,color:'#5f6470'}}>{fmtDate(d.key).slice(0,3)}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="mono" style={{fontSize:11,color:'#7c8493',letterSpacing:1.5,marginBottom:12}}>CATEGORY BREAKDOWN</div>
      {catBreakdown.map(c=>(
        <div key={c.name} style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:13}}>
            <span style={{fontWeight:500}}>{c.name}</span>
            <span className="mono" style={{fontSize:12,color:'#7c8493'}}>{c.earned}/{c.total} · {c.pct}%</span>
          </div>
          <div style={{height:6,borderRadius:4,background:'#2a2d35',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${c.pct}%`,background:accentColor,borderRadius:4,transition:'width .4s'}}/>
          </div>
        </div>
      ))}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── MEASUREMENTS TAB ─────────────────────────────────────────────────────────
function MeasurementsTab({ dateKey, dayOffset, setDayOffset, measurements, latestM, saveMeasurement, accentColor, readOnly }) {
  const todayVals=measurements[dateKey]||{};
  return (
    <div className="fade">
      <DayNav dateKey={dateKey} dayOffset={dayOffset} setDayOffset={setDayOffset}/>
      {readOnly && (
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid #2a2d35',marginBottom:16,fontSize:12,color:'#7c8493'}}>
          <IC.Eye/> View only — this is not your data
        </div>
      )}
      <div className="mono" style={{fontSize:11,color:'#7c8493',letterSpacing:1.5,marginBottom:14}}>BODY MEASUREMENTS (CM)</div>
      {MEASUREMENT_AREAS.map(area=>{
        const l=latestM[area.name]||{val:area.base,from:'baseline'};
        const current=todayVals[area.name];
        const diff=current!=null?+(current-l.val).toFixed(2):null;
        return (
          <div key={area.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{area.name}</div>
              <div style={{fontSize:11,color:'#7c8493',marginTop:2}}>{area.note}</div>
              <div className="mono" style={{fontSize:11,color:'#5f6470',marginTop:2}}>last: {l.val} cm · {l.from==='baseline'?'baseline':fmtDate(l.from)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <input type="number" step="0.1" placeholder={String(l.val)} value={current??''}
                onChange={e=>!readOnly&&saveMeasurement(area.name,e.target.value)}
                readOnly={readOnly}
                className="mono"
                style={{width:80,padding:'8px 10px',borderRadius:8,border:'1px solid '+(readOnly?'#1c1f26':'#2a2d35'),background:'#15171c',color:'#e7e9ee',fontSize:14,textAlign:'right',outline:'none',cursor:readOnly?'default':'text'}}/>
              {diff!=null&&diff!==0&&<span className="mono" style={{fontSize:11,color:diff>0?'#7ad6a0':'#f08b8b'}}>{diff>0?'+':''}{diff}</span>}
            </div>
          </div>
        );
      })}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── LEADERBOARD TAB ─────────────────────────────────────────────────────────
function LeaderboardTab({ allLogs }) {
  const dateKey = getDateKey(0);
  const scores = USERS.map(u => {
    const dl = (allLogs[u.name]||{})[dateKey]||{};
    let xp=0;
    CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`])xp+=a.xp;}));
    return { ...u, xp, pct: TOTAL_XP?Math.round((xp/TOTAL_XP)*100):0 };
  }).sort((a,b)=>b.xp-a.xp);

  return (
    <div className="fade">
      <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>Leaderboard</div>
      <div className="mono" style={{fontSize:11,color:'#7c8493',marginBottom:24}}>{fmtDate(dateKey)} — today</div>
      {scores.map((u,i)=>(
        <div key={u.name} style={{display:'flex',alignItems:'center',gap:14,background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:14,padding:'14px 16px',marginBottom:10}}>
          <div className="mono" style={{fontSize:20,fontWeight:700,color:i===0?'#e8b34e':i===1?'#9aa1ad':i===2?'#cd7f32':'#5f6470',width:28,textAlign:'center'}}>
            {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
          </div>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:u.color}}/>
                <span style={{fontWeight:600,fontSize:15}}>{u.name}</span>
              </div>
              <span className="mono" style={{fontSize:13,color:u.color}}>{u.xp} XP · {u.pct}%</span>
            </div>
            <div style={{height:5,background:'#2a2d35',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${u.pct}%`,background:u.color,borderRadius:3,transition:'width .5s ease'}}/>
            </div>
          </div>
        </div>
      ))}
      <div style={{height:80}}/>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [currentUser, setCurrentUser] = React.useState(()=>{
    try { const s=localStorage.getItem('ql_user'); return s?JSON.parse(s):null; } catch{ return null; }
  });
  const [viewingUser, setViewingUser] = React.useState(null); // null = self
  const [tab, setTab] = React.useState('log');
  const [dayOffset, setDayOffset] = React.useState(0);
  const [allLogs, setAllLogs] = React.useState({});
  const [allMeasurements, setAllMeasurements] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [syncing, setSyncing] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [isMobile, setIsMobile] = React.useState(window.innerWidth<640);
  const [showUserPicker, setShowUserPicker] = React.useState(false);

  React.useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<640);
    window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h);
  },[]);

  function handleLogin(user) {
    localStorage.setItem('ql_user', JSON.stringify(user));
    setCurrentUser(user);
    setViewingUser(null);
  }
  function handleLogout() {
    localStorage.removeItem('ql_user');
    setCurrentUser(null);
    setViewingUser(null);
  }

  const activeUser = viewingUser || currentUser;
  const readOnly = viewingUser !== null;
  const accentColor = USERS.find(u=>u.name===activeUser?.name)?.color || '#e8b34e';

  const loadData = React.useCallback(async()=>{
    try {
      setLoading(true); setError(null);
      const [lr,mr]=await Promise.all([readSheet('Daily Log'),readSheet('Measurements')]);
      setAllLogs(parseLogRows(lr));
      setAllMeasurements(parseMeasRows(mr));
    } catch(e){ setError('Could not reach Google Sheets.'); }
    finally { setLoading(false); }
  },[]);

  React.useEffect(()=>{ if(currentUser) loadData(); },[currentUser,loadData]);

  const dateKey = getDateKey(dayOffset);
  const userLogs = (allLogs[activeUser?.name]||{});
  const dayLog = userLogs[dateKey]||{};
  const userMeasurements = (allMeasurements[activeUser?.name]||{});

  const earnedXP = React.useMemo(()=>{
    let s=0; CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dayLog[`${c.name}::${a.name}`])s+=a.xp;})); return s;
  },[dayLog]);
  const fulfilment = TOTAL_XP?Math.round((earnedXP/TOTAL_XP)*100):0;

  const catBreakdown = React.useMemo(()=>CATEGORIES.map(c=>{
    const total=c.activities.reduce((s,a)=>s+a.xp,0);
    const earned=c.activities.reduce((s,a)=>s+(dayLog[`${c.name}::${a.name}`]?a.xp:0),0);
    return {name:c.name,total,earned,pct:total?Math.round((earned/total)*100):0};
  }),[dayLog]);

  const last7 = React.useMemo(()=>Array.from({length:7},(_,i)=>{
    const k=getDateKey(i-6); const dl=(userLogs[k]||{}); let s=0;
    CATEGORIES.forEach(c=>c.activities.forEach(a=>{if(dl[`${c.name}::${a.name}`])s+=a.xp;}));
    return {key:k,pct:TOTAL_XP?Math.round((s/TOTAL_XP)*100):0};
  }),[userLogs]);

  const latestM = React.useMemo(()=>{
    const dates=Object.keys(userMeasurements).sort();
    return MEASUREMENT_AREAS.reduce((acc,area)=>{
      let val=area.base,from='baseline';
      for(const d of dates){if(userMeasurements[d]?.[area.name]!=null){val=userMeasurements[d][area.name];from=d;}}
      acc[area.name]={val,from}; return acc;
    },{});
  },[userMeasurements]);

  const toggle = React.useCallback(async(catName,actName,xp)=>{
    if(readOnly) return;
    const key=`${catName}::${actName}`, uname=currentUser.name;
    const current=!!((allLogs[uname]||{})[dateKey]||{})[key], next=!current;
    setAllLogs(prev=>({...prev,[uname]:{...(prev[uname]||{}),[dateKey]:{...((prev[uname]||{})[dateKey]||{}),[key]:next}}}));
    setSyncing(true);
    try { await appendRow('Daily Log',[dateKey,uname,catName,actName,xp,next?'TRUE':'FALSE']); }
    catch(e){ setAllLogs(prev=>({...prev,[uname]:{...(prev[uname]||{}),[dateKey]:{...((prev[uname]||{})[dateKey]||{}),[key]:current}}})); setError('Sync failed.'); }
    finally { setSyncing(false); }
  },[readOnly,currentUser,allLogs,dateKey]);

  const saveMeasurement = React.useCallback(async(areaName,value)=>{
    if(readOnly) return;
    const v=value===''?null:parseFloat(value), uname=currentUser.name;
    setAllMeasurements(prev=>{
      const day={...((prev[uname]||{})[dateKey]||{})};
      if(v==null) delete day[areaName]; else day[areaName]=v;
      return {...prev,[uname]:{...(prev[uname]||{}),[dateKey]:day}};
    });
    if(v!=null){ setSyncing(true); try{ await appendRow('Measurements',[dateKey,uname,areaName,v]); }catch(e){setError('Sync failed.');}finally{setSyncing(false);} }
  },[readOnly,currentUser,dateKey]);

  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;

  if(loading) return (
    <div style={{background:'#15171c',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div className="spin" style={{display:'flex'}}><IC.Loader/></div>
      <div className="mono" style={{color:'#7c8493',fontSize:13}}>Loading Quest Log…</div>
    </div>
  );

  const TABS = [
    {id:'log',label:'Today',Icon:IC.Today},
    {id:'dashboard',label:'Stats',Icon:IC.Activity},
    {id:'measurements',label:'Body',Icon:IC.Ruler},
    {id:'leaderboard',label:'Squad',Icon:IC.Users},
  ];

  const sharedProps = { dateKey,dayOffset,setDayOffset,dayLog,toggle,earnedXP,fulfilment,catBreakdown,last7,measurements:userMeasurements,latestM,saveMeasurement,accentColor,readOnly };

  return (
    <div style={{background:'#15171c',color:'#e7e9ee',minHeight:'100vh',maxWidth:isMobile?'100%':880,margin:'0 auto'}}>
      {/* Header */}
      <div style={{padding:isMobile?'20px 18px 12px':'28px 40px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div className="mono" style={{fontSize:11,color:'#7c8493',letterSpacing:2,marginBottom:2}}>DAY IN LIFE</div>
          <div style={{fontSize:isMobile?20:26,fontWeight:700}}>Quest Log</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {syncing&&<div className="spin" style={{display:'flex',opacity:0.6}}><IC.Loader/></div>}
          {/* User switcher */}
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowUserPicker(v=>!v)} style={{
              display:'flex',alignItems:'center',gap:8,padding:'7px 12px',borderRadius:10,
              border:`1px solid ${accentColor}44`,background:`${accentColor}11`,
              color:'#e7e9ee',fontSize:13,fontWeight:600,cursor:'pointer'
            }}>
              <div style={{width:8,height:8,borderRadius:'50%',background:accentColor}}/>
              {activeUser?.name}
              {readOnly&&<span style={{fontSize:10,color:'#7c8493',background:'#2a2d35',padding:'2px 6px',borderRadius:4}}>viewing</span>}
            </button>
            {showUserPicker&&(
              <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#1c1f26',border:'1px solid #2a2d35',borderRadius:12,padding:8,zIndex:200,minWidth:160,boxShadow:'0 8px 32px rgba(0,0,0,0.4)'}}>
                <div style={{fontSize:11,color:'#5f6470',padding:'4px 8px 8px',fontWeight:600}}>VIEW AS</div>
                {USERS.map(u=>(
                  <button key={u.name} onClick={()=>{
                    setViewingUser(u.name===currentUser.name?null:u);
                    setShowUserPicker(false);
                    setTab('log');
                  }} style={{
                    display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:8,
                    border:'none',background:activeUser?.name===u.name?`${u.color}18`:'transparent',
                    color:'#e7e9ee',fontSize:13,fontWeight:500,cursor:'pointer',textAlign:'left'
                  }}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:u.color}}/>
                    {u.name}
                    {u.name===currentUser.name&&<span style={{fontSize:10,color:'#7c8493',marginLeft:'auto'}}>you</span>}
                  </button>
                ))}
                <div style={{borderTop:'1px solid #2a2d35',marginTop:8,paddingTop:8}}>
                  <button onClick={()=>{setShowUserPicker(false);handleLogout();}} style={{
                    display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:8,
                    border:'none',background:'transparent',color:'#f08b8b',fontSize:13,cursor:'pointer'
                  }}><IC.Logout/> Sign out</button>
                </div>
              </div>
            )}
          </div>
          <button onClick={loadData} style={{...navBtn,color:'#9aa1ad'}}><IC.Refresh/></button>
        </div>
      </div>

      {error&&<div style={{margin:'0 18px 12px',padding:'10px 14px',borderRadius:10,background:'rgba(240,100,100,0.1)',border:'1px solid rgba(240,100,100,0.3)',fontSize:13,color:'#f08b8b',display:'flex',justifyContent:'space-between'}}>
        {error}<button onClick={()=>setError(null)} style={{background:'none',border:'none',color:'#f08b8b',cursor:'pointer'}}>✕</button>
      </div>}

      {/* Close picker on outside click */}
      {showUserPicker&&<div onClick={()=>setShowUserPicker(false)} style={{position:'fixed',inset:0,zIndex:100}}/>}

      {isMobile ? (
        <>
          <div style={{padding:'0 18px 16px'}}>
            {tab==='log'&&<LogTab {...sharedProps}/>}
            {tab==='dashboard'&&<DashboardTab {...sharedProps}/>}
            {tab==='measurements'&&<MeasurementsTab {...sharedProps}/>}
            {tab==='leaderboard'&&<LeaderboardTab allLogs={allLogs}/>}
          </div>
          <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#1c1f26',borderTop:'1px solid #2a2d35',display:'flex',padding:'10px 0 20px',zIndex:100}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',color:tab===t.id?accentColor:'#5f6470',fontSize:11,fontWeight:600,cursor:'pointer',transition:'color .15s'}}>
                <t.Icon/>{t.label}
              </button>
            ))}
          </div>
        </>
      ) : (
        <div style={{display:'flex'}}>
          <div style={{width:180,padding:'8px 16px',flexShrink:0}}>
            <div style={{display:'flex',flexDirection:'column',gap:4,position:'sticky',top:32}}>
              {TABS.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,border:'1px solid '+(tab===t.id?accentColor:'transparent'),background:tab===t.id?accentColor+'18':'transparent',color:tab===t.id?accentColor:'#9aa1ad',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
                  <t.Icon/>{t.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,padding:'8px 40px 60px 24px'}}>
            {tab==='log'&&<LogTab {...sharedProps}/>}
            {tab==='dashboard'&&<DashboardTab {...sharedProps}/>}
            {tab==='measurements'&&<MeasurementsTab {...sharedProps}/>}
            {tab==='leaderboard'&&<LeaderboardTab allLogs={allLogs}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
